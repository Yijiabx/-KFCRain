<!DOCTYPE html>

    <style>
        * {

        }

</head>
<body>

    <!-- 3:4 主画面容器 -->
    <div class="viewport-wrapper">
        <div id="bg-container"></div>
        <canvas id="rainCanvas"></canvas>
    </div>

    <!-- 悬浮控制面板 -->
    <div class="control-panel">
        <h3>雨景控制台</h3>
        
        <!-- 背景图替换 -->
        <div class="control-group">
            <label>替换背景图片</label>
            <label class="file-upload-btn">
                选择本地图片
                <input type="file" id="bgUploader" accept="image/*">
            </label>
        </div>

        <!-- 背景明暗调节 -->
        <div class="control-group">
            <label>背景亮度 <span class="value-display" id="bgBrightnessVal">1.00x</span></label>
            <input type="range" id="bgBrightness" min="0.1" max="1.5" step="0.05" value="1.00">
        </div>

        <!-- 落雨空间范围控制 -->
        <div class="control-group">
            <label>落雨起始高度 <span class="value-display" id="landingStartVal">12%</span></label>
            <input type="range" id="landingStart" min="0" max="100" value="12">
        </div>
        <div class="control-group">
            <label>落雨结束高度 <span class="value-display" id="landingEndVal">100%</span></label>
            <input type="range" id="landingEnd" min="0" max="100" value="100">
        </div>

        <!-- 雨声 BGM -->
        <div class="control-group">
            <label>雨声 BGM</label>
            <label class="file-upload-btn">
                上传雨声音频
                <input type="file" id="rainAudioUploader" accept="audio/*">
            </label>
            <div class="audio-controls" id="rainAudioControls" style="display: none;">
                <button class="clear-btn" id="playRainBtn">播放</button>
                <input type="range" id="rainVolume" min="0" max="1" step="0.05" value="0.5">
            </div>
        </div>

        <!-- 音乐 BGM -->
        <div class="control-group">
            <label>音乐 BGM</label>
            <label class="file-upload-btn">
                上传音乐音频
                <input type="file" id="musicAudioUploader" accept="audio/*">
            </label>
            <div class="audio-controls" id="musicAudioControls" style="display: none;">
                <button class="clear-btn" id="playMusicBtn">播放</button>
                <input type="range" id="musicVolume" min="0" max="1" step="0.05" value="0.5">
            </div>
        </div>

        <!-- 视频下载按钮 -->
        <button class="record-btn" id="recordBtn">录制并下载 8 秒视频</button>
    </div>

    <script>
        const canvas = document.getElementById('rainCanvas');
        const ctx = canvas.getContext('2d');
        const bgContainer = document.getElementById('bg-container');
        const wrapper = document.querySelector('.viewport-wrapper');

        // 核心默认参数（隐藏/锁定的参数）
        const globalPatternOpacity = 1.00;
        const rainDensity = 30;
        const rainSpeedMultiplier = 1.0; 
        const baseRippleSize = 110;       
        const rippleSizeRandomness = 100; 
        const baseRainLength = 30;  
        const baseRainWidth = 1.5;  
        const rainUniformity = 0.35;    

        // 允许用户控制的参数
        let currentBgBrightness = 1.00; 
        let landingStartRatio = 0.12; 
        let landingEndRatio = 1.00;   
        
        const defaultPatterns = []; 

        const raindrops = [];
        const ripples = [];
        const splashes = [];

        let dpr = window.devicePixelRatio || 1;
        let vWidth = 300;  
        let vHeight = 400; 

        // Web Audio API 混音相关变量（支持录制音频）
        let audioCtx = null;
        let recDest = null;

        let rainAudio = null;
        let rainGain = null;
        let rainSource = null;

        let musicAudio = null;
        let musicGain = null;
        let musicSource = null;

        function resizeCanvas() {
            dpr = window.devicePixelRatio || 1;
            const rect = wrapper.getBoundingClientRect();
            
            if (rect.width > 0 && rect.height > 0) {
                vWidth = rect.width;
                vHeight = rect.height;
            } else {
                vHeight = Math.min(window.innerHeight, window.innerWidth * 1.33);
                vWidth = vHeight * 0.75;
            }

            canvas.width = vWidth * dpr;
            canvas.height = vHeight * dpr;
            ctx.scale(dpr, dpr);

            raindrops.length = 0;
            ripples.length = 0;
            splashes.length = 0;
            adjustRainDensity();
        }
        
        // 动态生成不可修改的文字图案
        function initFixedPatterns() {
            const names = ['eggtart', 'original', 'chicken wings', 'chicken popcorn', 'chicken nuggets'];
            const size = 256; 
            
            names.forEach(name => {
                const offscreen = document.createElement('canvas');
                offscreen.width = size;
                offscreen.height = size;
                const oCtx = offscreen.getContext('2d');
                
                oCtx.fillStyle = '#ffffff';
                oCtx.textAlign = 'center';
                oCtx.textBaseline = 'middle';
                
                let fontSize = 28;
                if (name.length > 12) fontSize = 22;
                oCtx.font = `bold ${fontSize}px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif`;
                
                oCtx.fillText(name, size / 2, size / 2);
                
                const img = new Image();
                img.src = offscreen.toDataURL();
                defaultPatterns.push(img);
            });
        }

        // 水花颗粒
        class SplashParticle {
            constructor(x, y, scale) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 3.2 * scale;
                this.vy = -(Math.random() * 2.8 + 1.6) * scale; 
                this.gravity = 0.15; 
                this.alpha = 1.0;
                this.size = (Math.random() * 1.5 + 1.2) * scale;
                this.fade = Math.random() * 0.04 + 0.03; 
            }

            update() {
                this.x += this.vx * rainSpeedMultiplier; 
                this.vy += this.gravity * rainSpeedMultiplier; 
                this.y += this.vy * rainSpeedMultiplier;
                this.alpha -= this.fade * rainSpeedMultiplier;
            }

            draw() {
                if (this.alpha <= 0) return;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.fill();
            }
        }

        // 椭圆涟漪
        class Ripple {
            constructor(x, y, scale) {
                this.x = x;
                this.y = y;
                this.scale = scale; 
                this.radiusX = 1; 
                
                this.maxRadiusX = (baseRippleSize + Math.random() * rippleSizeRandomness) * scale; 
                this.growthSpeed = (0.018 * this.maxRadiusX + 0.4) * scale; 
                this.alpha = 1.0;

                this.hasPattern = Math.random() < 0.666;
                if (this.hasPattern && defaultPatterns.length > 0) {
                    this.patternImg = defaultPatterns[Math.floor(Math.random() * defaultPatterns.length)];
                }
            }

            update() {
                this.radiusX += this.growthSpeed * rainSpeedMultiplier; 
                const maxR = this.maxRadiusX > 0 ? this.maxRadiusX : 1;
                
                const ratio = this.radiusX / maxR;
                if (ratio >= 1) {
                    this.alpha = 0;
                } else if (ratio < 0.4) {
                    this.alpha = 1.0;
                } else {
                    const fadeRatio = (ratio - 0.4) / 0.6;
                    this.alpha = Math.cos(fadeRatio * Math.PI / 2);
                }
            }

            draw() {
                if (this.alpha <= 0) return;

                const flattenRatio = 0.45;
                const radiusY = this.radiusX * flattenRatio;

                ctx.save();
                ctx.beginPath();
                ctx.ellipse(this.x, this.y, this.radiusX, radiusY, 0, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255, 255, 255, ${this.alpha * 0.65})`;
                ctx.lineWidth = 1; 
                ctx.stroke();
                ctx.restore();

                if (this.hasPattern && this.patternImg && this.patternImg.complete) {
                    ctx.save();
                    ctx.globalAlpha = this.alpha * globalPatternOpacity;
                    
                    const scaleW = this.radiusX * 1.5;
                    const scaleH = radiusY * 1.5;
                    
                    ctx.drawImage(
                        this.patternImg, 
                        this.x - scaleW / 2, 
                        this.y - scaleH / 2, 
                        scaleW, 
                        scaleH
                    );

                    ctx.restore();
                }
            }
        }

        // 雨滴
        class Raindrop {
            constructor(index) {
                this.index = index;
                this.reset(true); 
            }

            reset(initFully = false) {
                this.angle = -Math.PI / 6; 

                const horizonStart = vHeight * landingStartRatio;
                const horizonEnd = vHeight * landingEndRatio;
                const minH = Math.min(horizonStart, horizonEnd);
                const maxH = Math.max(horizonStart, horizonEnd);
                const heightDiff = maxH - minH;
                
                this.targetY = minH + Math.random() * (heightDiff > 0 ? heightDiff : 1);

                const baseHorizon = vHeight * 0.05; 
                const divisor = vHeight - baseHorizon;
                const depthScale = divisor > 0 ? (this.targetY - baseHorizon) / divisor : 0;
                this.scale = 0.35 + depthScale * 0.65; 

                const randomX = Math.random() * vWidth; 
                const slotWidth = vWidth / rainDensity; 
                const slotX = (this.index + Math.random()) * slotWidth; 
                
                this.targetX = randomX + (slotX - randomX) * rainUniformity;

                this.y = -100; 
                const dy = this.targetY - this.y;
                const dx = dy * Math.sin(this.angle);
                
                this.x = this.targetX - dx;

                this.length = (baseRainLength + Math.random() * (baseRainLength * 0.5)) * this.scale;
                this.width = baseRainWidth * this.scale;
                this.speedY = (14 + Math.random() * 8) * this.scale;
                this.speedX = this.speedY * Math.sin(this.angle);
                this.alpha = 0.15 + this.scale * 0.35;

                if (initFully) {
                    const progress = Math.random();
                    this.y = this.y + progress * dy;
                    this.x = this.x + progress * dx;
                }
            }

            update() {
                this.x += this.speedX * rainSpeedMultiplier;
                this.y += this.speedY * rainSpeedMultiplier;

                if (this.y >= this.targetY) {
                    const count = Math.floor(Math.random() * 4) + 4;
                    for (let i = 0; i < count; i++) {
                        splashes.push(new SplashParticle(this.x, this.targetY, this.scale));
                    }

                    ripples.push(new Ripple(this.x, this.targetY, this.scale));
                    this.reset(false);
                }
            }

            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.strokeStyle = `rgba(220, 230, 255, ${this.alpha})`;
                ctx.lineWidth = this.width;
                
                ctx.moveTo(this.x, this.y);
                const endX = this.x + this.length * Math.sin(this.angle);
                const endY = this.y + this.length * Math.cos(this.angle);
                ctx.lineTo(endX, endY);
                
                ctx.stroke();
                ctx.restore();
            }
        }

        function adjustRainDensity() {
            while (raindrops.length < rainDensity) {
                raindrops.push(new Raindrop(raindrops.length));
            }
            if (raindrops.length > rainDensity) {
                raindrops.length = rainDensity;
            }
            for (let i = 0; i < raindrops.length; i++) {
                raindrops[i].index = i;
            }
        }

        function animate() {
            ctx.clearRect(0, 0, vWidth, vHeight);

            // 1. 绘制雨丝
            for (let i = 0; i < raindrops.length; i++) {
                raindrops[i].update();
                raindrops[i].draw();
            }

            // 2. 绘制水花
            for (let i = splashes.length - 1; i >= 0; i--) {
                const sp = splashes[i];
                sp.update();
                sp.draw();
                if (sp.alpha <= 0) {
                    splashes.splice(i, 1);
                }
            }

            // 3. 绘制椭圆涟漪
            for (let i = ripples.length - 1; i >= 0; i--) {
                const r = ripples[i];
                r.update();
                r.draw();
                if (r.alpha <= 0) {
                    ripples.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        // --- BGM 基础控制函数 ---
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                recDest = audioCtx.createMediaStreamDestination();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // --- 初始化与绑定事件 ---

        initFixedPatterns();
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 替换背景
        const bgUploader = document.getElementById('bgUploader');
        bgUploader.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    bgContainer.style.backgroundImage = `url('${event.target.result}')`;
                };
                reader.readAsDataURL(file);
            }
        });

        // 背景明暗调节
        const bgBrightnessSlider = document.getElementById('bgBrightness');
        const bgBrightnessVal = document.getElementById('bgBrightnessVal');
        bgBrightnessSlider.addEventListener('input', function(e) {
            currentBgBrightness = parseFloat(e.target.value);
            bgBrightnessVal.innerText = currentBgBrightness.toFixed(2) + 'x';
            bgContainer.style.filter = `brightness(${currentBgBrightness}) contrast(1.1) saturate(0.9)`;
        });

        // 雨滴落地范围调节
        const landingStartSlider = document.getElementById('landingStart');
        const landingStartVal = document.getElementById('landingStartVal');
        landingStartSlider.addEventListener('input', function(e) {
            landingStartRatio = parseInt(e.target.value, 10) / 100;
            landingStartVal.innerText = e.target.value + '%';
        });

        const landingEndSlider = document.getElementById('landingEnd');
        const landingEndVal = document.getElementById('landingEndVal');
        landingEndSlider.addEventListener('input', function(e) {
            landingEndRatio = parseInt(e.target.value, 10) / 100;
            landingEndVal.innerText = e.target.value + '%';
        });

        // 雨声 BGM
        const rainAudioUploader = document.getElementById('rainAudioUploader');
        const rainAudioControls = document.getElementById('rainAudioControls');
        const playRainBtn = document.getElementById('playRainBtn');
        const rainVolume = document.getElementById('rainVolume');

        rainAudioUploader.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                initAudio();
                if (rainAudio) {
                    rainAudio.pause();
                }
                rainAudio = new Audio(url);
                rainAudio.loop = true;
                
                // 将音频节点连至播放器和录制端
                rainSource = audioCtx.createMediaElementSource(rainAudio);
                rainGain = audioCtx.createGain();
                rainGain.gain.value = parseFloat(rainVolume.value);
                
                rainSource.connect(rainGain);
                rainGain.connect(audioCtx.destination);
                rainGain.connect(recDest);

                rainAudioControls.style.display = 'flex';
                playRainBtn.innerText = '暂停';
                rainAudio.play().catch(err => {
                    console.log("播放被拦截:", err);
                    playRainBtn.innerText = '播放';
                });
            }
        });

        playRainBtn.addEventListener('click', function() {
            if (!rainAudio) return;
            initAudio();
            if (rainAudio.paused) {
                rainAudio.play();
                playRainBtn.innerText = '暂停';
            } else {
                rainAudio.pause();
                playRainBtn.innerText = '播放';
            }
        });

        rainVolume.addEventListener('input', function(e) {
            if (rainGain) {
                rainGain.gain.value = parseFloat(e.target.value);
            }
        });

        // 音乐 BGM
        const musicAudioUploader = document.getElementById('musicAudioUploader');
        const musicAudioControls = document.getElementById('musicAudioControls');
        const playMusicBtn = document.getElementById('playMusicBtn');
        const musicVolume = document.getElementById('musicVolume');

        musicAudioUploader.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                initAudio();
                if (musicAudio) {
                    musicAudio.pause();
                }
                musicAudio = new Audio(url);
                musicAudio.loop = true;
                
                // 将音频节点连至播放器和录制端
                musicSource = audioCtx.createMediaElementSource(musicAudio);
                musicGain = audioCtx.createGain();
                musicGain.gain.value = parseFloat(musicVolume.value);
                
                musicSource.connect(musicGain);
                musicGain.connect(audioCtx.destination);
                musicGain.connect(recDest);

                musicAudioControls.style.display = 'flex';
                playMusicBtn.innerText = '暂停';
                musicAudio.play().catch(err => {
                    console.log("播放被拦截:", err);
                    playMusicBtn.innerText = '播放';
                });
            }
        });

        playMusicBtn.addEventListener('click', function() {
            if (!musicAudio) return;
            initAudio();
            if (musicAudio.paused) {
                musicAudio.play();
                playMusicBtn.innerText = '暂停';
            } else {
                musicAudio.pause();
                playMusicBtn.innerText = '播放';
            }
        });

        musicVolume.addEventListener('input', function(e) {
            if (musicGain) {
                musicGain.gain.value = parseFloat(e.target.value);
            }
        });

        // --- 视频与混音录制核心逻辑 ---
        const recordBtn = document.getElementById('recordBtn');
        let isRecording = false;

        recordBtn.addEventListener('click', () => {
            if (isRecording) return;
            isRecording = true;
            recordBtn.disabled = true;

            const chunks = [];
            const videoStream = canvas.captureStream(30); 
            let combinedStream = videoStream;

            // 如果有 BGM 音轨输入，将音轨融入导出的视频流中
            if (recDest && recDest.stream.getAudioTracks().length > 0) {
                combinedStream = new MediaStream([
                    ...videoStream.getVideoTracks(),
                    ...recDest.stream.getAudioTracks()
                ]);
            }

            let options = { mimeType: 'video/webm; codecs=vp9' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                options = { mimeType: 'video/webm; codecs=vp8' };
            }
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                options = { mimeType: 'video/webm' };
            }
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                options = { mimeType: 'video/mp4' }; 
            }

            let mediaRecorder;
            try {
                mediaRecorder = new MediaRecorder(combinedStream, options);
            } catch (e) {
                mediaRecorder = new MediaRecorder(combinedStream); 
            }

            mediaRecorder.ondataavailable = (e) => {
                if (e.data && e.data.size > 0) {
                    chunks.push(e.data); 
                }
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: mediaRecorder.mimeType || 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `rain_clip_${Date.now()}.webm`; 
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                recordBtn.innerText = '录制并下载 8 秒视频';
                recordBtn.disabled = false;
                isRecording = false;
            };

            mediaRecorder.start();

            let timeLeft = 8;
            recordBtn.innerText = `录制中 (${timeLeft}s)...`;

            const timer = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    recordBtn.innerText = `录制中 (${timeLeft}s)...`;
                } else {
                    clearInterval(timer);
                    recordBtn.innerText = '正在生成视频文件...';
                    mediaRecorder.stop(); 
                }
            }, 1000);
        });

        animate();
    </script>
</body>
</html>
