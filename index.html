<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3:4 斑马线雨景特效（范围与均匀度可控版）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0b0d;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 3:4 比例竖版主容器 */
        .viewport-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 75vh;       /* 3:4 比例几何校正 */
            max-height: 133.33vw;  /* 3:4 比例几何校正 */
            aspect-ratio: 3 / 4;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            background-color: #151515;
            border-radius: 8px;

        /* 背景容器 */
        #bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            background-size: cover;

</head>
<body>

    <!-- 3:4 主画面容器 -->
    <div class="viewport-wrapper">
        <div id="bg-container"></div>
        <canvas id="rainCanvas"></canvas>
    </div>

    <!-- 悬浮控制面板 -->
    <div class="control-panel">
        <h3>雨景控制台</h3>
        
        <!-- 背景图替换 -->
        <div class="control-group">
            <label>替换背景图片</label>
            <label class="file-upload-btn">
                选择本地图片
                <input type="file" id="bgUploader" accept="image/*">
            </label>
        </div>

        <!-- 背景明暗调节 -->
        <div class="control-group">
            <label>背景亮度 <span class="value-display" id="bgBrightnessVal">0.70x</span></label>
            <input type="range" id="bgBrightness" min="0.1" max="1.5" step="0.05" value="0.70">
        </div>

        <!-- 图案上传 -->
        <div class="control-group">
            <div class="preview-header">
                <label style="margin-bottom: 0;">已加载的图案池</label>
                <button class="clear-btn" id="clearPatternsBtn">清空已上传</button>
            </div>
            <label class="file-upload-btn" style="margin-top: 4px;">
                选择图片追加到图案池
                <input type="file" id="patternUploader" accept="image/*" multiple>
            </label>
            <div class="preview-container" id="patternPreviews">
                <span class="preview-tag">已内置 5 款默认几何图案</span>
            </div>
        </div>

        <!-- 落雨空间范围控制（新增） -->
        <div class="control-group">
            <label>落雨起始高度 <span class="value-display" id="landingStartVal">20%</span></label>
            <input type="range" id="landingStart" min="0" max="100" value="20">
        </div>
        <div class="control-group">
            <label>落雨结束高度 <span class="value-display" id="landingEndVal">100%</span></label>
            <input type="range" id="landingEnd" min="0" max="100" value="100">
        </div>

        <!-- 降落点均匀度调节（新增） -->
        <div class="control-group">
            <label>雨滴落地均匀度 (调高防止堆叠) <span class="value-display" id="rainUniformityVal">0.35</span></label>
            <input type="range" id="rainUniformity" min="0" max="1" step="0.05" value="0.35">
        </div>

        <!-- 雨滴下落速度 -->
        <div class="control-group">
            <label>雨滴下落速度 <span class="value-display" id="speedVal">1.0x</span></label>
            <input type="range" id="rainSpeed" min="0.2" max="3.0" step="0.1" value="1.0">
        </div>

        <!-- 雨丝长度 -->
        <div class="control-group">
            <label>雨丝长度 <span class="value-display" id="rainLengthVal">60</span></label>
            <input type="range" id="rainLength" min="10" max="250" step="2" value="60">
        </div>

        <!-- 雨丝粗细 -->
        <div class="control-group">
            <label>雨丝粗细 <span class="value-display" id="rainWidthVal">1.2px</span></label>
            <input type="range" id="rainWidth" min="0.2" max="6.0" step="0.1" value="1.2">
        </div>

        <!-- 椭圆基础大小 -->
        <div class="control-group">
            <label>椭圆基础大小 (支持超大) <span class="value-display" id="baseSizeVal">35</span></label>
            <input type="range" id="baseSize" min="10" max="150" step="1" value="35">
        </div>

        <!-- 大小随机程度 -->
        <div class="control-group">
            <label>大小随机度 (产生大小对比) <span class="value-display" id="sizeRandomVal">40</span></label>
            <input type="range" id="sizeRandom" min="0" max="150" step="1" value="40">
        </div>

        <!-- 图案透明度修改 -->
        <div class="control-group">
            <label>图案透明度 <span class="value-display" id="opacityVal">0.75</span></label>
            <input type="range" id="patternOpacity" min="0.1" max="1" step="0.05" value="0.75">
        </div>

        <!-- 雨量大小调节 -->
        <div class="control-group">
            <label>下雨密度 <span class="value-display" id="rainDensityVal">50</span></label>
            <input type="range" id="rainDensity" min="15" max="120" step="5" value="50">
        </div>

        <!-- 视频下载按钮 -->
        <button class="record-btn" id="recordBtn">录制并下载 8 秒视频</button>
    </div>

    <script>
        const canvas = document.getElementById('rainCanvas');
        const ctx = canvas.getContext('2d');
        const bgContainer = document.getElementById('bg-container');
        const wrapper = document.querySelector('.viewport-wrapper');

        // 参数控制
        let globalPatternOpacity = 0.75;
        let rainDensity = 50;
        let rainSpeedMultiplier = 1.0; 
        let baseRippleSize = 35;       
        let rippleSizeRandomness = 40; 
        let currentBgBrightness = 0.70; 
        
        let baseRainLength = 60;  
        let baseRainWidth = 1.2;  

        // 新增：落雨范围和分布均匀度参数
        let landingStartRatio = 0.20; // 默认从屏幕 20% 高度处开始落雨，解决“太靠上”或“太靠下”的问题
        let landingEndRatio = 1.00;   // 默认落雨到屏幕底部 100%
        let rainUniformity = 0.35;    // 分布均匀度 (0 = 纯随机产生自然簇，1 = 分层采样网格化均匀分配)
        
        let customPatterns = []; 
        const defaultPatterns = []; 

        const raindrops = [];
        const ripples = [];
        const splashes = [];

        let dpr = window.devicePixelRatio || 1;
        let vWidth = 300;  
        let vHeight = 400; 

        function resizeCanvas() {
            dpr = window.devicePixelRatio || 1;
            const rect = wrapper.getBoundingClientRect();
            
            if (rect.width > 0 && rect.height > 0) {
                vWidth = rect.width;
                vHeight = rect.height;
            } else {
                vHeight = Math.min(window.innerHeight, window.innerWidth * 1.33);
                vWidth = vHeight * 0.75;
            }

            canvas.width = vWidth * dpr;
            canvas.height = vHeight * dpr;
            ctx.scale(dpr, dpr);

            raindrops.length = 0;
            ripples.length = 0;
            splashes.length = 0;
            adjustRainDensity();
        }
        
        function initDefaultPatterns() {
            const size = 100;
            const designs = [
                (c) => {
                    c.strokeStyle = '#ffffff'; c.lineWidth = 3;
                    for(let r=12; r<50; r+=14) {
                        c.beginPath(); c.arc(50, 50, r, 0, Math.PI*2); c.stroke();
                    }
                },
                (c) => {
                    c.strokeStyle = '#ffffff'; c.lineWidth = 3;
                    c.translate(50, 50);
                    for (let i = 0; i < 6; i++) {
                        c.beginPath(); c.moveTo(0, 0); c.lineTo(0, -40); c.stroke();
                        c.beginPath(); c.moveTo(-8, -25); c.lineTo(0, -33); c.lineTo(8, -25); c.stroke();
                        c.rotate(Math.PI / 3);
                    }
                },
                (c) => {
                    c.strokeStyle = '#ffffff'; c.lineWidth = 2;
                    c.beginPath(); c.arc(50, 50, 42, 0, Math.PI*2); c.stroke();
                    c.translate(50, 50);
                    for(let i=0; i<8; i++) {
                        c.beginPath(); c.moveTo(0, -42); c.lineTo(0, -32); c.stroke();
                        c.rotate(Math.PI/4);
                    }
                },
                (c) => {
                    c.strokeStyle = '#ffffff'; c.lineWidth = 3;
                    c.beginPath(); c.arc(35, 50, 18, 0, Math.PI*2); c.stroke();
                    c.beginPath(); c.arc(65, 50, 18, 0, Math.PI*2); c.stroke();
                },
                (c) => {
                    c.strokeStyle = '#ffffff'; c.lineWidth = 2.5;
                    c.beginPath();
                    for (let i = 0; i < 60; i++) {
                        let angle = 0.15 * i;
                        let r = 0.7 * i;
                        let x = 50 + r * Math.cos(angle);
                        let y = 50 + r * Math.sin(angle);
                        if (i === 0) c.moveTo(x, y); else c.lineTo(x, y);
                    }
                    c.stroke();
                }
            ];

            designs.forEach(draw => {
                const offscreen = document.createElement('canvas');
                offscreen.width = size; offscreen.height = size;
                const oCtx = offscreen.getContext('2d');
                draw(oCtx);
                const img = new Image();
                img.src = offscreen.toDataURL();
                defaultPatterns.push(img);
            });
        }

        // 水花颗粒
        class SplashParticle {
            constructor(x, y, scale) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 3.2 * scale;
                this.vy = -(Math.random() * 2.8 + 1.6) * scale; 
                this.gravity = 0.15; 
                this.alpha = 1.0;
                this.size = (Math.random() * 1.5 + 1.2) * scale;
                this.fade = Math.random() * 0.04 + 0.03; 
            }

            update() {
                this.x += this.vx * rainSpeedMultiplier; 
                this.vy += this.gravity * rainSpeedMultiplier; 
                this.y += this.vy * rainSpeedMultiplier;
                this.alpha -= this.fade * rainSpeedMultiplier;
            }

            draw() {
                if (this.alpha <= 0) return;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.fill();
            }
        }

        // 椭圆涟漪
        class Ripple {
            constructor(x, y, scale) {
                this.x = x;
                this.y = y;
                this.scale = scale; 
                this.radiusX = 1; 
                
                this.maxRadiusX = (baseRippleSize + Math.random() * rippleSizeRandomness) * scale; 
                this.growthSpeed = (0.018 * this.maxRadiusX + 0.4) * scale; 
                this.alpha = 1.0;

                this.hasPattern = Math.random() < 0.666;
                if (this.hasPattern) {
                    const pool = customPatterns.length > 0 ? customPatterns : defaultPatterns;
                    this.patternImg = pool[Math.floor(Math.random() * pool.length)];
                }
            }

            update() {
                this.radiusX += this.growthSpeed * rainSpeedMultiplier; 
                const maxR = this.maxRadiusX > 0 ? this.maxRadiusX : 1;
                
                const ratio = this.radiusX / maxR;
                if (ratio >= 1) {
                    this.alpha = 0;
                } else if (ratio < 0.4) {
                    this.alpha = 1.0;
                } else {
                    const fadeRatio = (ratio - 0.4) / 0.6;
                    this.alpha = Math.cos(fadeRatio * Math.PI / 2);
                }
            }

            draw() {
                if (this.alpha <= 0) return;

                const flattenRatio = 0.45;
                const radiusY = this.radiusX * flattenRatio;

                ctx.save();
                ctx.beginPath();
                ctx.ellipse(this.x, this.y, this.radiusX, radiusY, 0, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255, 255, 255, ${this.alpha * 0.65})`;
                ctx.lineWidth = 1; 
                ctx.stroke();
                ctx.restore();

                if (this.hasPattern && this.patternImg && this.patternImg.complete) {
                    ctx.save();
                    
                    const innerRadiusX = this.radiusX * 0.67;
                    const innerRadiusY = radiusY * 0.67;

                    ctx.beginPath();
                    ctx.ellipse(this.x, this.y, innerRadiusX, innerRadiusY, 0, 0, Math.PI * 2);
                    ctx.clip(); 

                    ctx.globalAlpha = this.alpha * globalPatternOpacity;
                    
                    ctx.drawImage(
                        this.patternImg, 
                        this.x - innerRadiusX, 
                        this.y - innerRadiusY, 
                        innerRadiusX * 2, 
                        innerRadiusY * 2
                    );

                    ctx.restore();
                }
            }
        }

        // 雨滴 (重构：引入 index 支撑分层均匀分布算法)
        class Raindrop {
            constructor(index) {
                this.index = index;
                this.reset(true); 
            }

            reset(initFully = false) {
                this.angle = -Math.PI / 6; 

                // 1. 根据用户设置的起始和结束高度，决定落雨的 Y 轴区间
                const horizonStart = vHeight * landingStartRatio;
                const horizonEnd = vHeight * landingEndRatio;
                const minH = Math.min(horizonStart, horizonEnd);
                const maxH = Math.max(horizonStart, horizonEnd);
                const heightDiff = maxH - minH;
                
                // 确定该雨滴的精准落地目标 Y
                this.targetY = minH + Math.random() * (heightDiff > 0 ? heightDiff : 1);

                // 2. 根据落地高度，计算透视比例 (依然完美维持近大远小的 3D 视觉深度)
                const baseHorizon = vHeight * 0.05; // 参照最顶端
                const divisor = vHeight - baseHorizon;
                const depthScale = divisor > 0 ? (this.targetY - baseHorizon) / divisor : 0;
                this.scale = 0.35 + depthScale * 0.65; 

                // 3. 落地 X 坐标：引入分层采样网格算法，完美实现“更平均”与“更随机”的无级调节
                const randomX = Math.random() * vWidth; // 纯随机落地位置
                const slotWidth = vWidth / rainDensity; // 分割成等宽的通道
                const slotX = (this.index + Math.random()) * slotWidth; // 分配到专属通道，并附带微小抖动
                
                // 线性插值决定均匀度 (rainUniformity: 0 = 纯随机，1 = 绝对均匀分布)
                this.targetX = randomX + (slotX - randomX) * rainUniformity;

                // 4. 【核心物理重构】：通过逆向轨迹算法，推算出雨滴在屏幕顶部的起点 (x, y)，防止出现斜向死角
                this.y = -100; // 在视口上方看不见的区域起步
                const dy = this.targetY - this.y;
                const dx = dy * Math.sin(this.angle);
                
                // 确保它斜向下落后，必定精准落在目标 x 坐标 targetX 上！
                this.x = this.targetX - dx;

                // 5. 应用长度、粗细和物理速度
                this.length = (baseRainLength + Math.random() * (baseRainLength * 0.5)) * this.scale;
                this.width = baseRainWidth * this.scale;
                this.speedY = (14 + Math.random() * 8) * this.scale;
                this.speedX = this.speedY * Math.sin(this.angle);
                this.alpha = 0.15 + this.scale * 0.35;

                // 首次完全初始化时，随机打散雨滴在下落路径上的当前进度
                if (initFully) {
                    const progress = Math.random();
                    this.y = this.y + progress * dy;
                    this.x = this.x + progress * dx;
                }
            }

            update() {
                this.x += this.speedX * rainSpeedMultiplier;
                this.y += this.speedY * rainSpeedMultiplier;

                if (this.y >= this.targetY) {
                    const count = Math.floor(Math.random() * 4) + 4;
                    for (let i = 0; i < count; i++) {
                        splashes.push(new SplashParticle(this.x, this.targetY, this.scale));
                    }

                    ripples.push(new Ripple(this.x, this.targetY, this.scale));
                    this.reset(false);
                }
            }

            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.strokeStyle = `rgba(220, 230, 255, ${this.alpha})`;
                ctx.lineWidth = this.width;
                
                ctx.moveTo(this.x, this.y);
                const endX = this.x + this.length * Math.sin(this.angle);
                const endY = this.y + this.length * Math.cos(this.angle);
                ctx.lineTo(endX, endY);
                
                ctx.stroke();
                ctx.restore();
            }
        }

        // 实时改变雨滴尺寸
        function updateActiveRaindropsSizing() {
            for (let i = 0; i < raindrops.length; i++) {
                raindrops[i].length = (baseRainLength + Math.random() * (baseRainLength * 0.5)) * raindrops[i].scale;
                raindrops[i].width = baseRainWidth * raindrops[i].scale;
            }
        }

        function adjustRainDensity() {
            while (raindrops.length < rainDensity) {
                raindrops.push(new Raindrop(raindrops.length));
            }
            if (raindrops.length > rainDensity) {
                raindrops.length = rainDensity;
            }
            // 重建通道索引，确保均匀算法参数正常
            for (let i = 0; i < raindrops.length; i++) {
                raindrops[i].index = i;
            }
        }

        function animate() {
            ctx.clearRect(0, 0, vWidth, vHeight);

            // 1. 绘制雨丝
            for (let i = 0; i < raindrops.length; i++) {
                raindrops[i].update();
                raindrops[i].draw();
            }

            // 2. 绘制水花
            for (let i = splashes.length - 1; i >= 0; i--) {
                const sp = splashes[i];
                sp.update();
                sp.draw();
                if (sp.alpha <= 0) {
                    splashes.splice(i, 1);
                }
            }

            // 3. 绘制椭圆涟漪
            for (let i = ripples.length - 1; i >= 0; i--) {
                const r = ripples[i];
                r.update();
                r.draw();
                if (r.alpha <= 0) {
                    ripples.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        // --- 初始化与绑定事件 ---

        initDefaultPatterns();
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 替换背景
        const bgUploader = document.getElementById('bgUploader');
        bgUploader.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {

                    bgContainer.style.backgroundImage = `url('${event.target.result}')`;

                reader.readAsDataURL(file);

        // 背景明暗调节
        const bgBrightnessSlider = document.getElementById('bgBrightness');
        const bgBrightnessVal = document.getElementById('bgBrightnessVal');
        bgBrightnessSlider.addEventListener('input', function(e) {

            bgContainer.style.filter = `brightness(${currentBgBrightness}) contrast(1.1) saturate(0.9)`;

        // 刷新图案列表UI显示
        function updatePatternPreviews() {
            patternPreviews.innerHTML = '';
            if (customPatterns.length === 0) {
                patternPreviews.innerHTML = '<span class="preview-tag">已内置 5 款默认几何图案</span>';
                return;
            }
            customPatterns.forEach((img, index) => {
                const tag = document.createElement('span');
                tag.className = 'preview-tag';
                tag.innerText = `图案 ${index + 1}`;
                patternPreviews.appendChild(tag);
            });
        }

        // 追加式上传图案 
        const patternUploader = document.getElementById('patternUploader');
        patternUploader.addEventListener('change', function(e) {
            const files = e.target.files;
            if (files.length > 0) {
                Array.from(files).forEach((file) => {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = () => {
                            customPatterns.push(img); 
                            updatePatternPreviews();
                        };
                    };
                    reader.readAsDataURL(file);
                });
            }
        });

        // 清空自定义上传图库按钮
        const clearPatternsBtn = document.getElementById('clearPatternsBtn');
        clearPatternsBtn.addEventListener('click', function() {
            customPatterns = [];
            updatePatternPreviews();
        });

        // 雨滴落地范围调节
        const landingStartSlider = document.getElementById('landingStart');
        const landingStartVal = document.getElementById('landingStartVal');
        landingStartSlider.addEventListener('input', function(e) {
            landingStartRatio = parseInt(e.target.value, 10) / 100;
            landingStartVal.innerText = e.target.value + '%';
        });

        const landingEndSlider = document.getElementById('landingEnd');
        const landingEndVal = document.getElementById('landingEndVal');
        landingEndSlider.addEventListener('input', function(e) {
            landingEndRatio = parseInt(e.target.value, 10) / 100;
            landingEndVal.innerText = e.target.value + '%';
        });

        // 分布均匀度调节
        const rainUniformitySlider = document.getElementById('rainUniformity');
        const rainUniformityVal = document.getElementById('rainUniformityVal');
        rainUniformitySlider.addEventListener('input', function(e) {
            rainUniformity = parseFloat(e.target.value);
            rainUniformityVal.innerText = rainUniformity.toFixed(2);

        const speedSlider = document.getElementById('rainSpeed');

        speedSlider.addEventListener('input', function(e) {
            rainSpeedMultiplier = parseFloat(e.target.value);
            speedVal.innerText = rainSpeedMultiplier.toFixed(1) + 'x';

        // 雨丝长度调节
        const rainLengthSlider = document.getElementById('rainLength');
        const rainLengthVal = document.getElementById('rainLengthVal');

            baseRainLength = parseInt(e.target.value, 10);

            updateActiveRaindropsSizing();

        // 雨丝粗细调节
        const rainWidthSlider = document.getElementById('rainWidth');

        const baseSizeSlider = document.getElementById('baseSize');
        const baseSizeVal = document.getElementById('baseSizeVal');

            opacityVal.innerText = globalPatternOpacity.toFixed(2);
        });

        const rainSlider = document.getElementById('rainDensity');

        // --- 视频录制核心逻辑 ---
        const recordBtn = document.getElementById('recordBtn');
        let isRecording = false;

        recordBtn.addEventListener('click', () => {
            if (isRecording) return;
            isRecording = true;
            recordBtn.disabled = true;

            const chunks = [];
            const stream = canvas.captureStream(30); 

            let options = { mimeType: 'video/webm; codecs=vp9' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                options = { mimeType: 'video/webm; codecs=vp8' };
            }
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                options = { mimeType: 'video/webm' };
            }
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                options = { mimeType: 'video/mp4' }; 
            }

            let mediaRecorder;
            try {
                mediaRecorder = new MediaRecorder(stream, options);
            } catch (e) {
                mediaRecorder = new MediaRecorder(stream); 
            }

            mediaRecorder.ondataavailable = (e) => {
                if (e.data && e.data.size > 0) {
                    chunks.push(e.data); 
                }
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: mediaRecorder.mimeType || 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `rain_clip_${Date.now()}.webm`; 
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                recordBtn.innerText = '录制并下载 8 秒视频';
                recordBtn.disabled = false;
                isRecording = false;
            };

            mediaRecorder.start();

            let timeLeft = 8;
            recordBtn.innerText = `录制中 (${timeLeft}s)...`;

            const timer = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    recordBtn.innerText = `录制中 (${timeLeft}s)...`;
                } else {
                    clearInterval(timer);
                    recordBtn.innerText = '正在生成视频文件...';
                    mediaRecorder.stop(); 
                }
            }, 1000);
        });

        animate();
    </script>

</html>
